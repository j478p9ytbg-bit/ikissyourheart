<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ikissyourheart</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }

    .logo {
      max-width: 420px;
      width: 80%;
      margin-bottom: 48px;
    }

    a.btn {
      display: inline-block;
      padding: 16px 40px;
      background: #000;
      color: #fff;
      text-decoration: none;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      transition: background 0.2s;
    }

    a.btn:hover { background: #333; }
  </style>
</head>
<body>
  <img class="logo" src="logo.png" alt="Logo">
  <a class="btn" href="https://www.ebay.de/usr/ikissyourheart" target="_blank">
    eBay shop →
  </a>
</body>
</html>
